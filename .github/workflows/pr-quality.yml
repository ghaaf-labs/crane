
name: PR Quality

permissions:
  contents: read
  issues: read
  pull-requests: write

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  anti-slop:
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@v0
        with:
          # This project is intentionally AI-assisted (commits are co-authored by
          # Claude); do not block those authors.
          blocked-commit-authors: ""
          require-description: true
          min-account-age: 5
